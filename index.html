<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Race to 1k LP — LND Standard Ladder</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#05050e;--bg2:#0b0b1a;--gold:#ffd700;--gold2:#ffaa00;--am:#ff3355;--emea:#3a9bff;--txt:#ddddf5;--txt2:#6666aa;--txt3:#3a3a88;}
body{background:var(--bg);color:var(--txt);font-family:'Rajdhani',sans-serif;min-height:100vh;overflow-x:hidden;}
canvas#stars{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.5;}
.wrap{max-width:1080px;margin:0 auto;padding:32px 22px 48px;position:relative;z-index:1;}
.hdr{text-align:center;margin-bottom:28px;}
.hdr .sup{font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:6px;color:var(--gold2);text-transform:uppercase;margin-bottom:8px;opacity:.75;}
.hdr h1{font-family:'Orbitron',sans-serif;font-size:clamp(36px,6.5vw,72px);font-weight:900;letter-spacing:-2px;line-height:1;color:var(--gold);text-shadow:0 0 60px rgba(255,215,0,.28);}
.hdr h1 em{color:var(--txt);font-style:normal;}
.hdr .sub{margin-top:8px;font-size:13px;color:var(--txt2);letter-spacing:3px;text-transform:uppercase;font-weight:300;}
.legend{display:flex;justify-content:center;gap:28px;margin-bottom:18px;}
.leg{display:flex;align-items:center;gap:7px;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;}
.leg-sq{width:10px;height:10px;border-radius:2px;}
.axis{display:flex;justify-content:space-between;padding:0 18px 0 212px;margin-bottom:4px;}
.axis span{font-family:'Orbitron',sans-serif;font-size:8px;color:var(--txt3);letter-spacing:1px;}
.chart-outer{position:relative;background:var(--bg2);border:1px solid rgba(255,215,0,.06);border-radius:13px;overflow:hidden;}
.chart-outer::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(transparent,transparent 3px,rgba(0,0,0,.09) 3px,rgba(0,0,0,.09) 4px);pointer-events:none;z-index:8;border-radius:13px;}
.grid-lines{position:absolute;top:0;bottom:0;left:192px;right:130px;display:flex;justify-content:space-between;pointer-events:none;z-index:2;}
.grid-line{width:1px;background:rgba(255,255,255,.035);}
.finish-line{position:absolute;top:0;bottom:0;right:130px;width:1px;background:#ff3355;opacity:.3;z-index:5;}
.finish-lbl{position:absolute;top:7px;right:134px;font-family:'Orbitron',sans-serif;font-size:8px;color:#ff3355;letter-spacing:2px;opacity:.55;z-index:6;}
.chart-inner{position:relative;padding:6px 0;}
.bar-row{display:flex;align-items:center;height:50px;padding:0 16px;position:absolute;left:0;right:0;transition:top .6s cubic-bezier(.4,0,.2,1),opacity .3s;}
.bar-row.hidden{opacity:0;pointer-events:none;}
.r-rank{width:28px;text-align:center;font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;color:var(--txt2);flex-shrink:0;}
.r-rank.rk1{color:var(--gold);}.r-rank.rk2{color:#b0b0b0;}.r-rank.rk3{color:#b07040;}
.r-name{width:148px;font-size:15px;font-weight:700;letter-spacing:.3px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.r-track{flex:1;height:24px;background:rgba(255,255,255,.04);border-radius:4px;overflow:hidden;position:relative;z-index:3;}
.r-bar{height:100%;border-radius:4px;transition:width .5s cubic-bezier(.4,0,.2,1);min-width:2px;}
.r-bar.am{background:linear-gradient(90deg,rgba(160,15,35,.85),var(--am));}
.r-bar.emea{background:linear-gradient(90deg,rgba(15,55,160,.85),var(--emea));}
.r-bar.won{background:linear-gradient(90deg,rgba(130,95,0,.9),var(--gold));box-shadow:0 0 14px rgba(255,215,0,.32);}
@keyframes pw{0%,100%{filter:brightness(1);}50%{filter:brightness(1.28);}}
.r-bar.won{animation:pw 1.1s ease-in-out infinite;}
.r-lp{width:72px;text-align:right;font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;flex-shrink:0;margin-left:10px;}
.r-lp.maxed{color:var(--gold);}
.r-reg{width:46px;text-align:center;font-size:10px;font-weight:700;letter-spacing:1px;padding:2px 0;border-radius:3px;flex-shrink:0;margin-left:7px;}
.r-reg.am{color:var(--am);background:rgba(255,51,85,.12);}
.r-reg.emea{color:var(--emea);background:rgba(58,155,255,.12);}
.winner-wrap{display:none;text-align:center;padding:20px;margin-top:16px;background:rgba(255,215,0,.04);border:1px solid rgba(255,215,0,.2);border-radius:10px;}
@keyframes pop{from{opacity:0;transform:scale(.94);}to{opacity:1;transform:scale(1);}}
.winner-wrap.show{display:block;animation:pop .4s ease;}
.winner-wrap h2{font-family:'Orbitron',sans-serif;font-size:26px;color:var(--gold);text-shadow:0 0 32px rgba(255,215,0,.4);}
.winner-wrap p{color:var(--txt2);font-size:12px;letter-spacing:2px;text-transform:uppercase;margin-top:4px;}
.controls{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:22px;flex-wrap:wrap;}
.btn{font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;padding:10px 20px;border-radius:5px;border:1px solid;cursor:pointer;background:transparent;transition:background .15s,color .15s;font-weight:700;}
.btn-reset{color:var(--txt2);border-color:rgba(255,255,255,.16);}
.btn-reset:hover{background:rgba(255,255,255,.05);color:var(--txt);}
.btn-skip{color:var(--gold2);border-color:rgba(255,170,0,.3);}
.btn-skip:hover{background:rgba(255,170,0,.08);color:var(--gold);}
.btn-play{color:#4dffb0;border-color:rgba(77,255,176,.3);display:none;}
.btn-play:hover{background:rgba(77,255,176,.08);color:#7fffcc;}
.btn-play.visible{display:inline-block;}
.spd{display:flex;align-items:center;gap:8px;color:var(--txt2);font-size:12px;letter-spacing:1px;}
.spd input[type=range]{width:90px;accent-color:var(--gold);}
.pagination{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:16px;}
.pg-btn{font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;padding:8px 16px;border-radius:5px;border:1px solid rgba(255,255,255,.14);cursor:pointer;background:transparent;color:var(--txt2);transition:background .15s,color .15s;font-weight:700;}
.pg-btn:hover:not(:disabled){background:rgba(255,255,255,.05);color:var(--txt);}
.pg-btn:disabled{opacity:.3;cursor:default;}
.pg-info{font-family:'Orbitron',sans-serif;font-size:10px;color:var(--gold2);letter-spacing:2px;min-width:120px;text-align:center;}
.bottom{display:flex;align-items:center;gap:14px;margin-top:14px;}
.progress-wrap{flex:1;background:rgba(255,255,255,.04);border-radius:3px;height:6px;overflow:visible;position:relative;cursor:pointer;transition:height .15s;}
.progress-wrap:hover{height:8px;}
.progress-bar{height:100%;background:var(--gold);border-radius:3px;transition:width .1s linear;box-shadow:0 0 5px rgba(255,215,0,.38);pointer-events:none;}
.scrub-thumb{position:absolute;top:50%;left:0;transform:translate(-50%,-50%);width:13px;height:13px;border-radius:50%;background:var(--gold);box-shadow:0 0 8px rgba(255,215,0,.6);pointer-events:none;opacity:0;transition:opacity .15s;}
.progress-wrap:hover .scrub-thumb{opacity:1;}
.scrub-tooltip{position:absolute;bottom:18px;transform:translateX(-50%);background:rgba(10,10,30,.92);border:1px solid rgba(255,215,0,.25);border-radius:5px;padding:4px 10px;font-family:'Orbitron',sans-serif;font-size:9px;color:var(--gold2);letter-spacing:1px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s;}
.progress-wrap:hover .scrub-tooltip{opacity:1;}
.time-disp{font-family:'Orbitron',sans-serif;font-size:11px;color:var(--txt2);letter-spacing:2px;white-space:nowrap;flex-shrink:0;}
</style>
</head>
<body>
<canvas id="stars"></canvas>
<div class="wrap">
  <div class="hdr">
    <div class="sup">LND Community Event</div>
    <h1>RACE TO <em>1K</em></h1>
    <div class="sub">Standard Ladder · Americas &amp; EMEA</div>
  </div>
  <div class="legend">
    <div class="leg"><div class="leg-sq" style="background:var(--am)"></div><span style="color:var(--am)">Americas</span></div>
    <div class="leg"><div class="leg-sq" style="background:var(--emea)"></div><span style="color:var(--emea)">EMEA</span></div>
  </div>
  <div class="axis" id="axis"></div>
  <div class="chart-outer">
    <div class="grid-lines" id="gridLines"></div>
    <div class="finish-lbl">1000 LP</div>
    <div class="finish-line"></div>
    <div class="chart-inner" id="chartInner"></div>
  </div>
  <div class="winner-wrap" id="winnerWrap">
    <h2 id="winnerName">🏆</h2>
    <p id="winnerText">First to reach 1000 LP</p>
  </div>
  <div class="controls">
    <button class="btn btn-reset" onclick="restartReplay()">↺ REPLAY</button>
    <button class="btn btn-play" id="btnPlay" onclick="resumeReplay()">▶ PLAY</button>
    <button class="btn btn-skip" onclick="skipToEnd()">⏭ SKIP</button>
    <div class="spd">
      <span>SPEED</span>
      <input type="range" id="spdSlider" min="1" max="20" value="1" step="1">
      <span id="spdVal">1×</span>
    </div>
  </div>
  <div class="pagination">
    <button class="pg-btn" id="pgPrev" onclick="changePage(-1)" disabled>◀ PREV</button>
    <div class="pg-info" id="pgInfo">—</div>
    <button class="pg-btn" id="pgNext" onclick="changePage(1)">NEXT ▶</button>
  </div>
  <div class="bottom">
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar" id="progressBar" style="width:0%"></div>
      <div class="scrub-thumb" id="scrubThumb"></div>
      <div class="scrub-tooltip" id="scrubTooltip"></div>
    </div>
    <div class="time-disp" id="timeDisp">—</div>
  </div>
</div>
<script>
const RAILWAY_URL = 'https://race-to-1k-server-production.up.railway.app';
const RACE_START = new Date('2026-04-01T00:00:00');
const BAR_H = 50;
const PAGE_SIZE = 20;

let PLAYERS = [];
let snapshots = [], snapIdx = 0, dispLP = {}, playing = true, rafId = null, lastTs = null, winnerSeen = null;
let currentPage = 0;

const lerp = (a, b, t) => a + (b - a) * t;
const getLP = v => (v !== null && v !== undefined) ? (typeof v === 'object' ? v.lp : v) : null;

/* Stars */
(function(){
  const c = document.getElementById('stars'), ctx = c.getContext('2d');
  let W, H, stars = [];
  const resize = () => { W = c.width = innerWidth; H = c.height = innerHeight; };
  const init = () => { resize(); stars = Array.from({length:150}, () => ({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.1+.2,a:Math.random()*.65+.2,sp:Math.random()*.1+.04})); };
  const draw = () => { ctx.clearRect(0,0,W,H); const t=Date.now(); stars.forEach(s=>{ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(180,185,255,${Math.min(1,Math.max(0,s.a+Math.sin(t*s.sp*.001)*.06))})`;ctx.fill();}); requestAnimationFrame(draw); };
  window.addEventListener('resize', resize); init(); draw();
})();

function setPlaying(val) {
  playing = val;
  document.getElementById('btnPlay').classList.toggle('visible', !val);
}

async function fetchData() {
  try {
    const r = await fetch(RAILWAY_URL + '/snapshots');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return await r.json();
  } catch(e) { return { snapshots: [] }; }
}

function buildChart() {
  const ci = document.getElementById('chartInner');
  ci.innerHTML = '';
  PLAYERS.forEach((p, i) => {
    const d = document.createElement('div');
    d.className = 'bar-row hidden'; d.id = 'row_' + i;
    d.innerHTML =
      `<div class="r-rank" id="rnk_${i}"></div>` +
      `<div class="r-name">${p.name}</div>` +
      `<div class="r-track"><div class="r-bar ${p.region.toLowerCase()}" id="bar_${i}"></div></div>` +
      `<div class="r-lp" id="lp_${i}">— LP</div>` +
      `<div class="r-reg ${p.region.toLowerCase()}">${p.region}</div>`;
    ci.appendChild(d);
  });
  ci.style.height = (PAGE_SIZE * BAR_H + 12) + 'px';
  document.getElementById('gridLines').innerHTML = '<div class="grid-line"></div><div class="grid-line"></div><div class="grid-line"></div><div class="grid-line"></div>';
  document.getElementById('axis').innerHTML = ['0','250','500','750','1000'].map(v=>`<span>${v}</span>`).join('');
}

function renderChart() {
  const sorted = [...PLAYERS].sort((a,b) => (dispLP[b.key]||0) - (dispLP[a.key]||0));
  const totalPages = Math.ceil(sorted.length / PAGE_SIZE);
  const pageStart = currentPage * PAGE_SIZE;
  const pageEnd = pageStart + PAGE_SIZE;

  document.getElementById('pgInfo').textContent =
    `PAGE ${currentPage+1} / ${totalPages}  ·  #${pageStart+1}–${Math.min(pageEnd, sorted.length)}`;
  document.getElementById('pgPrev').disabled = currentPage === 0;
  document.getElementById('pgNext').disabled = currentPage >= totalPages - 1;

  sorted.forEach((p, globalRank) => {
    const i = PLAYERS.indexOf(p);
    const onPage = globalRank >= pageStart && globalRank < pageEnd;
    const row = document.getElementById('row_'+i);
    if (!onPage) { row.classList.add('hidden'); return; }
    row.classList.remove('hidden');

    const slotIdx = globalRank - pageStart;
    row.style.top = (6 + slotIdx * BAR_H) + 'px';

    const rnk = document.getElementById('rnk_'+i);
    rnk.textContent = globalRank + 1;
    rnk.className = 'r-rank' + (globalRank===0?' rk1':globalRank===1?' rk2':globalRank===2?' rk3':'');

    const lp = dispLP[p.key];
    const lr = lp !== null ? Math.round(lp) : null;
    const bar = document.getElementById('bar_'+i);
    bar.style.width = (lr !== null ? Math.min(100, lr/10) : 0) + '%';
    bar.className = 'r-bar ' + (lr >= 1000 ? 'won' : p.region.toLowerCase());

    const lpEl = document.getElementById('lp_'+i);
    lpEl.textContent = lr !== null ? lr+' LP' : '— LP';
    lpEl.className = 'r-lp' + (lr >= 1000 ? ' maxed' : '');
  });
}

function changePage(dir) {
  const totalPages = Math.ceil(PLAYERS.length / PAGE_SIZE);
  currentPage = Math.max(0, Math.min(totalPages - 1, currentPage + dir));
  renderChart();
}

function getSpeed() { return parseInt(document.getElementById('spdSlider').value) * 0.22; }

function animate(ts) {
  if (!lastTs) lastTs = ts;
  const dt = Math.min(ts - lastTs, 120); lastTs = ts;
  if (snapshots.length <= 1) {
    PLAYERS.forEach(p => { dispLP[p.key] = getLP(snapshots[0]?.players[p.key]); });
    renderChart();
    if (snapshots[0]) { document.getElementById('timeDisp').textContent = fmtDay(snapshots[0].ts); document.getElementById('progressBar').style.width = '100%'; }
    return;
  }
  snapIdx += (dt/1000) * getSpeed();
  const maxIdx = snapshots.length - 1;
  if (snapIdx >= maxIdx) { snapIdx = maxIdx; setPlaying(false); }
  const lo = Math.min(Math.floor(snapIdx), maxIdx-1);
  const hi = lo + 1;
  const t = snapIdx - lo;
  PLAYERS.forEach(p => {
    const va = getLP(snapshots[lo].players[p.key]);
    const vb = getLP(snapshots[hi]?.players[p.key]);
    dispLP[p.key] = (va !== null && vb !== null) ? lerp(va, vb, t) : (va ?? vb ?? null);
    if (!winnerSeen && dispLP[p.key] !== null && Math.round(dispLP[p.key]) >= 1000) { winnerSeen = p.key; showWinner(p); }
  });
  renderChart();
  const pct = snapIdx/maxIdx*100;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('scrubThumb').style.left = pct + '%';
  document.getElementById('timeDisp').textContent = fmtDay(snapshots[lo].ts);
  if (playing) rafId = requestAnimationFrame(animate);
}

function resumeReplay() {
  if (playing) return;
  lastTs = null;
  setPlaying(true);
  rafId = requestAnimationFrame(animate);
}

function skipToEnd() {
  cancelAnimationFrame(rafId); setPlaying(false);
  snapIdx = snapshots.length - 1;
  const last = snapshots[snapIdx];
  PLAYERS.forEach(p => { dispLP[p.key] = getLP(last?.players[p.key]); });
  PLAYERS.forEach(p => {
    if (!winnerSeen && dispLP[p.key] !== null && Math.round(dispLP[p.key]) >= 1000) { winnerSeen = p.key; showWinner(p); }
  });
  renderChart();
  document.getElementById('progressBar').style.width = '100%';
  document.getElementById('scrubThumb').style.left = '100%';
  document.getElementById('timeDisp').textContent = last ? fmtDay(last.ts) : '—';
}

function restartReplay() {
  cancelAnimationFrame(rafId); snapIdx = 0; lastTs = null; winnerSeen = null;
  setPlaying(true);
  document.getElementById('winnerWrap').classList.remove('show');
  document.getElementById('progressBar').style.width = '0%';
  document.getElementById('scrubThumb').style.left = '0%';
  PLAYERS.forEach(p => { dispLP[p.key] = getLP(snapshots[0]?.players[p.key]); });
  renderChart(); rafId = requestAnimationFrame(animate);
}

function showWinner(p) {
  document.getElementById('winnerName').textContent = '🏆 ' + p.name;
  document.getElementById('winnerText').textContent = 'First to 1000 LP · ' + (p.region==='AM'?'Americas':'EMEA');
  document.getElementById('winnerWrap').classList.add('show');
}

function fmtDay(ts) {
  const dayN = Math.floor((ts - RACE_START.getTime()) / 86400000) + 1;
  const d = new Date(ts);
  return `Day ${dayN}  ·  ${d.getDate()}.${d.getMonth()+1}.  ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

document.getElementById('spdSlider').oninput = function() { document.getElementById('spdVal').textContent = this.value + '×'; };

function scrubTo(ratio) {
  if (snapshots.length < 2) return;
  cancelAnimationFrame(rafId);
  setPlaying(false);
  lastTs = null;
  winnerSeen = null;
  document.getElementById('winnerWrap').classList.remove('show');
  snapIdx = ratio * (snapshots.length - 1);
  const lo = Math.min(Math.floor(snapIdx), snapshots.length - 2);
  const hi = lo + 1;
  const t = snapIdx - lo;
  PLAYERS.forEach(p => {
    const va = getLP(snapshots[lo].players[p.key]);
    const vb = getLP(snapshots[hi]?.players[p.key]);
    dispLP[p.key] = (va !== null && vb !== null) ? lerp(va, vb, t) : (va ?? vb ?? null);
    if (!winnerSeen && dispLP[p.key] !== null && Math.round(dispLP[p.key]) >= 1000) { winnerSeen = p.key; showWinner(p); }
  });
  renderChart();
  const pct = ratio * 100;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('scrubThumb').style.left = pct + '%';
  document.getElementById('timeDisp').textContent = fmtDay(snapshots[lo].ts);
}

function initScrubber() {
  const wrap = document.getElementById('progressWrap');
  const tooltip = document.getElementById('scrubTooltip');
  let dragging = false;

  function getRatio(e) {
    const rect = wrap.getBoundingClientRect();
    return Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  }
  function updateTooltip(ratio) {
    if (snapshots.length < 2) return;
    const idx = Math.min(Math.floor(ratio * (snapshots.length - 1)), snapshots.length - 1);
    tooltip.textContent = fmtDay(snapshots[idx].ts);
    tooltip.style.left = (ratio * 100) + '%';
  }

  wrap.addEventListener('mousemove', e => { updateTooltip(getRatio(e)); });
  wrap.addEventListener('mousedown', e => { dragging = true; scrubTo(getRatio(e)); updateTooltip(getRatio(e)); });
  window.addEventListener('mousemove', e => { if (dragging) { scrubTo(getRatio(e)); updateTooltip(getRatio(e)); } });
  window.addEventListener('mouseup', () => { dragging = false; });
  wrap.addEventListener('touchstart', e => { dragging = true; scrubTo(getRatio(e.touches[0])); }, {passive:true});
  window.addEventListener('touchmove', e => { if (dragging) scrubTo(getRatio(e.touches[0])); }, {passive:true});
  window.addEventListener('touchend', () => { dragging = false; });
}

async function main() {
  const data = await fetchData();
  snapshots = (data.snapshots || []).slice().sort((a,b) => a.ts - b.ts);
  if (snapshots.length === 0) return;

  const playerMap = {};
  snapshots.forEach(snap => {
    Object.entries(snap.players).forEach(([key, val]) => {
      if (!playerMap[key]) {
        const name = val.name || key;
        const region = val.region || 'AM';
        playerMap[key] = { key, name, region };
      }
    });
  });
  PLAYERS = Object.values(playerMap);

  buildChart();
  initScrubber();
  PLAYERS.forEach(p => { dispLP[p.key] = getLP(snapshots[0]?.players[p.key]); });
  renderChart();
  rafId = requestAnimationFrame(animate);
}

main();
</script>
</body>
</html>
